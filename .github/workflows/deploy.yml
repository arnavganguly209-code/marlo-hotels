name: Deploy to Hostinger VPS

# Requires VPS_HOST, VPS_USERNAME, VPS_SSH_KEY secrets.
# (Settings → Secrets and variables → Actions, or the production environment).
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  verify:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://marlo.theglobalorbit.com' }}

      - name: Confirm production build artifact
        run: |
          test -f .next/BUILD_ID || { echo "::error::Build succeeded but .next/BUILD_ID is missing"; exit 1; }
          echo "BUILD_ID=$(cat .next/BUILD_ID)"

  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verify deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$VPS_HOST" ]; then
            echo "::error::Missing secret VPS_HOST. Add it under Settings → Secrets and variables → Actions (or Environments → production)."
            missing=1
          fi
          if [ -z "$VPS_USERNAME" ]; then
            echo "::error::Missing secret VPS_USERNAME."
            missing=1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing secret VPS_SSH_KEY (full private key including BEGIN/END lines)."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "::error::Add VPS_HOST, VPS_USERNAME, and VPS_SSH_KEY, then run this workflow again from Actions → Deploy to Hostinger VPS → Run workflow."
            exit 1
          fi
          echo "Deploy secrets are present."

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /var/www/marlo-hotels

            echo "==> Pulling latest main"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Installing dependencies"
            npm ci

            echo "==> Applying database schema"
            if [ -n "${DATABASE_URL:-}" ] || grep -qE '^DATABASE_URL=.+' .env 2>/dev/null; then
              npx prisma migrate deploy || npx prisma db push
            else
              echo "DATABASE_URL not set — skipping Prisma migrate (Orbit login still works)."
            fi

            echo "==> Removing stale build"
            rm -rf .next

            echo "==> Building Next.js production artifacts"
            npm run build

            echo "==> Verifying production build exists before PM2"
            if [ ! -f .next/BUILD_ID ]; then
              echo "FATAL: .next/BUILD_ID missing after npm run build — refusing to restart PM2"
              exit 1
            fi
            echo "BUILD_ID=$(cat .next/BUILD_ID)"

            echo "==> (Re)starting ONLY the marlo-hotels PM2 app on port 3001"
            # Recreate just the marlo-hotels process from its dedicated
            # ecosystem file so PORT=3001 is always applied. This never
            # references hotel-thamel-park, so that process is untouched.
            if pm2 describe marlo-hotels >/dev/null 2>&1; then
              pm2 delete marlo-hotels
            fi
            pm2 start ecosystem.config.js --update-env
            pm2 save
            pm2 status marlo-hotels

            echo "==> Smoke check Marlo on port 3001"
            sleep 3
            curl -fsS -o /dev/null -w "marlo_local_status=%{http_code}\n" http://127.0.0.1:3001/ || {
              echo "FATAL: Marlo did not return HTTP 200 on 127.0.0.1:3001 after PM2 restart"
              pm2 logs marlo-hotels --lines 40 --nostream || true
              exit 1
            }
