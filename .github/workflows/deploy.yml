name: Deploy to Hostinger VPS

# Enterprise CI/CD for Marlo Hotels ONLY.
# Push to main → verify build → SSH deploy to /var/www/marlo-hotels.
# Never touches Hotel Thamel Park.
#
# Required secrets (Settings → Secrets and variables → Actions,
# OR Environments → production):
#   VPS_HOST       — VPS hostname or IP
#   VPS_USERNAME   — SSH user
#   VPS_SSH_KEY    — full private key (BEGIN/END lines included)
# Optional:
#   VPS_PORT       — SSH port (default 22)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  verify:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://marlo.theglobalorbit.com' }}

      - name: Confirm production build artifact
        run: |
          test -f .next/BUILD_ID || { echo "::error::Build succeeded but .next/BUILD_ID is missing"; exit 1; }
          echo "BUILD_ID=$(cat .next/BUILD_ID)"

  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verify deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$VPS_HOST" ]; then
            echo "::error::Missing secret VPS_HOST"
            missing=1
          fi
          if [ -z "$VPS_USERNAME" ]; then
            echo "::error::Missing secret VPS_USERNAME"
            missing=1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing secret VPS_SSH_KEY (full private key including BEGIN/END lines)"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "::error::Add these under Settings → Secrets and variables → Actions"
            echo "::error::AND/OR Environments → production (this job uses environment: production)."
            echo "::error::Required: VPS_HOST, VPS_USERNAME, VPS_SSH_KEY. Optional: VPS_PORT."
            echo "::error::After adding secrets, re-run: Actions → Deploy to Hostinger VPS → Run workflow."
            exit 1
          fi
          echo "Deploy secrets are present."
          echo "host_len=${#VPS_HOST} user_len=${#VPS_USERNAME} key_len=${#VPS_SSH_KEY}"

      - name: Deploy Marlo over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            # Marlo Hotels ONLY — never cd into Hotel Thamel Park paths.
            cd /var/www/marlo-hotels

            # Pull THIS commit first so scripts/deploy-vps.sh is the latest
            # version, then run the enterprise deploy (build → PM2 → health).
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy-vps.sh
            bash scripts/deploy-vps.sh

      - name: Post-deploy public verification
        run: |
          set -euo pipefail
          echo "==> Verifying live site from GitHub runner"
          for i in 1 2 3 4 5; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 30 https://marlo.theglobalorbit.com/ || true)"
            echo "attempt=$i public_status=$code"
            if [ "$code" = "200" ]; then
              # Confirm Hero video asset from latest commit is present
              html="$(curl -sS --max-time 30 https://marlo.theglobalorbit.com/ || true)"
              if echo "$html" | grep -q 'hero-demo.mp4\|<video'; then
                echo "Live site OK (HTTP 200 + Hero video markup)."
                exit 0
              fi
              echo "HTTP 200 but Hero video markup not found yet — retrying..."
            fi
            sleep 5
          done
          echo "::error::Live site did not return HTTP 200 with Hero video after deploy"
          exit 1
